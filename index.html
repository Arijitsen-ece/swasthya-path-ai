<!doctype html>
<html lang="en">
  <head>
    <!-- Basic Setup -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- App Title (Browser Tab Name) -->
    <title>My Health Companion</title>

    <!-- Favicon (Browser Icon) -->
    <link rel="icon" type="image/png" href="my-logo.png" />

    <!-- SEO Meta -->
    <meta name="description" content="AI-powered healthcare assistant that converts complex prescriptions into simple, easy-to-follow steps." />
    <meta name="author" content="My Health Companion" />

    <!-- Open Graph (for sharing on WhatsApp, LinkedIn, etc.) -->
    <meta property="og:title" content="My Health Companion" />
    <meta property="og:description" content="Simplify prescriptions into clear daily schedules using AI." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/logo.png" />

    <!-- Twitter Preview -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="My Health Companion" />
    <meta name="twitter:description" content="AI-powered prescription simplifier for better health management." />
    <meta name="twitter:image" content="/logo.png" />

    <!-- Theme Color (Mobile Browser UI Color) -->
    <meta name="theme-color" content="#22c55e" />
  </head>

  <body>
    <div id="root"></div>

    <!-- React Entry -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
